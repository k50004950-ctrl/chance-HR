    <!-- Android/iOS Safe Area 자동 감지 -->
    <script>
      function updateSafeArea() {
        // 1) env(safe-area-inset-bottom)을 CSS로 읽어서 사용 (iOS/Android 표준)
        var testEl = document.createElement('div');
        testEl.style.cssText = 'position:fixed;bottom:0;height:env(safe-area-inset-bottom);pointer-events:none;visibility:hidden;';
        document.documentElement.appendChild(testEl);
        var envBottom = testEl.offsetHeight || 0;
        document.documentElement.removeChild(testEl);

        // 2) env() 값이 있으면 사용, 없으면 Capacitor/Android fallback
        var safeBottom = envBottom;
        if (safeBottom === 0) {
          // Capacitor 웹뷰: screen.height - window.innerHeight 로 하단 nav bar 추정
          var screenDiff = window.screen.height - window.innerHeight;
          if (screenDiff > 40 && screenDiff < 150) {
            safeBottom = Math.min(screenDiff, 48);
          }
        }
        document.documentElement.style.setProperty('--safe-bottom', safeBottom + 'px');
      }

      document.addEventListener('DOMContentLoaded', updateSafeArea);
      window.addEventListener('resize', updateSafeArea);
    </script>

    <!-- Service Worker 완전 제거 -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            // 기존 Service Worker 모두 제거
            const registrations = await navigator.serviceWorker.getRegistrations();
            for (let registration of registrations) {
              await registration.unregister();
              console.log('🗑️ Service Worker 제거됨');
            }
            
            // 캐시 모두 삭제
            if ('caches' in window) {
              const cacheNames = await caches.keys();
              await Promise.all(cacheNames.map(cacheName => caches.delete(cacheName)));
              console.log('🗑️ 모든 캐시 삭제됨');
            }
            
            console.log('✅ Service Worker 비활성화 완료');
          } catch (error) {
            console.error('❌ Service Worker 제거 중 오류:', error);
          }
        });
      }
    </script>
