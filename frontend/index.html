    <!-- Android/iOS Safe Area 자동 감지 -->
    <script>
      function updateSafeArea() {
        // env(safe-area-inset-bottom) 실제 픽셀값 측정
        var el = document.createElement('div');
        el.style.cssText = 'position:fixed;bottom:0;left:0;width:1px;height:env(safe-area-inset-bottom,0px);pointer-events:none;visibility:hidden;';
        document.documentElement.appendChild(el);
        var envBottom = el.offsetHeight || 0;
        document.documentElement.removeChild(el);

        // visualViewport로 실제 가려진 영역 계산
        var vpBottom = 0;
        if (window.visualViewport) {
          vpBottom = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
          if (vpBottom < 0) vpBottom = 0;
        }

        var safeBottom = Math.max(envBottom, vpBottom);
        // 아무것도 감지 안되면 Android 기본값 34px 사용
        if (safeBottom < 8) safeBottom = 34;

        document.documentElement.style.setProperty('--safe-bottom', safeBottom + 'px');
      }

      document.addEventListener('DOMContentLoaded', updateSafeArea);
      window.addEventListener('resize', updateSafeArea);
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', updateSafeArea);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker 완전 제거 -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            // 기존 Service Worker 모두 제거
            const registrations = await navigator.serviceWorker.getRegistrations();
            for (let registration of registrations) {
              await registration.unregister();
              console.log('🗑️ Service Worker 제거됨');
            }
            
            // 캐시 모두 삭제
            if ('caches' in window) {
              const cacheNames = await caches.keys();
              await Promise.all(cacheNames.map(cacheName => caches.delete(cacheName)));
              console.log('🗑️ 모든 캐시 삭제됨');
            }
            
            console.log('✅ Service Worker 비활성화 완료');
          } catch (error) {
            console.error('❌ Service Worker 제거 중 오류:', error);
          }
        });
      }
    </script>
  </body>
